<style>

  .b-confirmed{background:#D1FAE5;color:#047857;}
  .b-completed{background:#E5E7EB;color:#374151;}
  .b-cancelled{background:#FEE2E2;color:#B91C1C;}

    font-weight:900;
    color:#6C7A73;
    margin-bottom:6px;
  }

    display:flex;
    justify-content:space-between;
    font-size:13px;
    font-weight:700;
    padding:4px 0;
    border-bottom:1px dashed rgba(0,0,0,.06);
  }
  .kv span:first-child{ color:#6C7A73; font-weight:800; }

    background:linear-gradient(180deg,#fff, #f0f5f0);
    border:1px solid rgba(144,163,153,.20);
    border-radius:24px;
    padding:18px;
    box-shadow:0 16px 40px rgba(144,163,153,.15);
  }

  .search-box{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px 16px;
    background:#fff;
    border-radius:20px;
    border:1px solid rgba(144,163,153,.20);
    box-shadow:0 8px 16px rgba(144,163,153,.08);
  }
  .search-box input{
    flex:1;
    border:none;
    outline:none;
    font-size:14px;
    font-weight:800;
    color:#39423D;
  }

  .tabs-wrap{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  .tab-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    padding:12px;
    border-radius:18px;
    font-size:13px;
    font-weight:900;
    border:1px solid rgba(144,163,153,.20);
    background:#fff;
    color:#6C7A73;
    box-shadow:0 6px 16px rgba(144,163,153,.08);
    transition:all .2s ease;
  }
  .tab-btn.active{
    background:#90A399;
    color:white;
    border-color:#90A399;
    box-shadow:0 12px 24px rgba(144,163,153,.25);
  }

  .stats-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:12px;
    font-weight:900;
    color:#6C7A73;
  }

    color:#90A399;
  }

    background:#90A399 !important;
    color:#fff !important;
    border-color:#90A399 !important;
    box-shadow:0 6px 16px rgba(144,163,153,.25);
  }

  .cute-input{
    background:#fff;
    border:2px solid #EBE9E4;
    border-radius:1rem;

  }
  .cute-input:focus{

    hour12: false
  };
  if(withSec) opt.second = "2-digit";
  return new Intl.DateTimeFormat("zh-TW", opt).format(new Date(iso)).replace(/\//g,"-");
}

async function fetchRecords(){
  const { data, error } = await sb.from(SB_TABLE)
    .select("id,created_at,owner_phone,pet_name,payload,status,admin_note")
    .order("created_at",{ascending:false}).limit(300);
  if(error){ console.error(error); return; }
  records = (data||[]).map(r=>({...r,payload:normalizePayload(r.payload)}));
}

async function handleChangePassword(){
  $("pwdError").classList.add("hidden");
  const oldPwd = $("pwdOld").value.trim();
  const newPwd = $("pwdNew").value.trim();
  const confirmPwd = $("pwdConfirm").value.trim();

  if(!oldPwd || !newPwd || !confirmPwd){
    $("pwdError").textContent = "請完整填寫所有欄位";
    $("pwdError").classList.remove("hidden");
    return;
  }
  if(newPwd.length < 6){
    $("pwdError").textContent = "新密碼至少 6 碼";
    $("pwdError").classList.remove("hidden");
    return;
  }
  if(newPwd !== confirmPwd){
    $("pwdError").textContent = "新密碼與確認不一致";
    $("pwdError").classList.remove("hidden");
    return;
  }

  try{
    await sbPwd.auth.signOut();
    const { error: signErr } = await sbPwd.auth.signInWithPassword({
      email: pwdTargetEmail,
      password: oldPwd
    });
    if(signErr) throw new Error("舊密碼錯誤");

    const { error: upErr } = await sbPwd.auth.updateUser({ password: newPwd });
    if(upErr) throw upErr;

    await sbPwd.auth.signOut();
    alert("✅ 密碼更新成功");
    closePwdModal();
  }catch(err){
    $("pwdError").textContent = "修改失敗：" + err.message;
    $("pwdError").classList.remove("hidden");
  }
}

function renderRecords(){
  const container = $("recordsList");
  const q = ($("searchInput").value || "").trim();

  const filtered = records.filter(r=>{
    const p = r.payload || {};
    const owner = (p.owner_name || "").toString();
    const phone = (r.owner_phone || p.owner_phone || "").toString();
    const pet = (r.pet_name || p.pet_name || "").toString();
    return !q || owner.includes(q) || phone.includes(q) || pet.includes(q);
  });
  container.innerHTML = "";
  if(filtered.length===0){ 
    $("recordsEmpty").classList.remove("hidden"); 
    $("recordsCount").textContent = 0;
    return; 
  }
  $("recordsEmpty").classList.add("hidden");
  $("recordsCount").textContent = filtered.length;

  filtered.forEach(r=>{
    const p=r.payload||{};
    
    // ✅ 檢查健康狀況是否有異常
    const healthFields = ["eye","ear","mouth","limbs","body","hair","skin"];
    const abnormalItems = healthFields.filter(f => p[f + "_status"] === "異常");
    const hasAbnormal = abnormalItems.length > 0;
    const abnormalLabels = { eye:"眼睛", ear:"耳朵", mouth:"口腔", limbs:"四肢", body:"身體", hair:"毛髮", skin:"皮膚" };
    const abnormalText = abnormalItems.map(f => abnormalLabels[f] || f).join("、");
    
    // ✅ 收集個性特質
    const temperamentLabels = [];
    if(p.temperament_stable) temperamentLabels.push("穩定");
    if(p.temperament_friendly) temperamentLabels.push("親人");
    if(p.temperament_dog_friendly) temperamentLabels.push("親狗");
    if(p.temperament_nervous) temperamentLabels.push("緊張");
    if(p.temperament_fear) temperamentLabels.push("恐懼");
    if(p.temperament_anxiety) temperamentLabels.push("分離焦慮");
    if(p.temperament_aggressive) temperamentLabels.push("攻擊性");
    const temperamentText = temperamentLabels.length > 0 ? temperamentLabels.join("、") : null;
    
    const div=document.createElement("div");
    div.className="rounded-2xl border border-hanamu-green/15 bg-white p-4 shadow-soft cursor-pointer hover:border-hanamu-green/40 transition-all";
    
    let tagsHtml = "";
    if(hasAbnormal){
      tagsHtml += `<span class="inline-block text-[10px] font-black bg-hanamu-red/20 text-hanamu-red px-2 py-0.5 rounded-full mr-1">⚠️ ${abnormalText}異常</span>`;
    }
    if(temperamentText){
      tagsHtml += `<span class="inline-block text-[10px] font-black bg-hanamu-green/15 text-hanamu-wood px-2 py-0.5 rounded-full">💖 ${temperamentText}</span>`;
    }
    
    div.innerHTML = `
      <div class="flex justify-between items-start gap-3">
        <div class="flex-1 min-w-0">
          <div class="text-[10px] text-hanamu-wood font-bold mb-1">${fmtTW(r.created_at)}</div>
          <div class="text-xl font-black text-hanamu-dark">${r.pet_name||p.pet_name||"-"}</div>
          <div class="text-xs text-hanamu-wood mt-1">${p.owner_name||"-"} ｜ ${r.owner_phone||"-"}</div>
          ${tagsHtml ? `<div class="mt-1.5 flex flex-wrap gap-1">${tagsHtml}</div>` : ""}
        </div>
        <div class="text-right shrink-0">
          <div class="${badgeClass(r.status||"pending")}">${badgeText(r.status||"pending")}</div>
        </div>
      </div>
    `;
    div.onclick=()=>openDetail(r.id);
    container.appendChild(div);
  });
}

function renderCustomers(){
  const q = ($("searchInput").value || "").trim();
  const groups = {};
  records.forEach(r=>{
    const p=r.payload||{};
    const phone=(r.owner_phone||p.owner_phone||"").toString();
    if(!phone) return;

    const owner = (p.owner_name||"").toString();
    const pet   = (p.pet_name||"").toString();

    if(q && !owner.includes(q) && !phone.includes(q) && !pet.includes(q)) return;

    if(!groups[phone]) groups[phone] = { phone, owner: p.owner_name||"-", pets:new Set(), count:0, history:[] };
    groups[phone].pets.add(p.pet_name||"-");
    groups[phone].count++;
    groups[phone].history.push(r);
  });
  const list = Object.values(groups);
  const container = $("customersList");
  container.innerHTML = "";
  if(list.length===0){ $("customersEmpty").classList.remove("hidden"); return; }
  $("customersEmpty").classList.add("hidden");

  list.forEach(c=>{
    const div=document.createElement("div");
    div.className="card p-4 cursor-pointer hover:border-hanamu-green/40 transition-all";
    div.innerHTML=`
      <div class="flex items-center justify-between gap-3">
        <div>
          <div class="font-black text-lg text-hanamu-dark">${c.owner}</div>
          <div class="text-xs text-hanamu-wood mt-1">${c.phone}</div>
          <div class="text-[10px] text-hanamu-wood mt-1">毛孩：${[...c.pets].join("、")}</div>
        </div>
        <div class="text-right">
          <div class="text-sm font-black text-hanamu-green mt-1">累計</div>
          <div class="text-[11px] font-black text-hanamu-wood">來訪 ${c.count} 次</div>
        </div>
      </div>
    `;
    div.onclick=()=>openCustomerModal(c.phone);
    container.appendChild(div);
  });

  if(window.lucide) lucide.createIcons();
}

    healthTitle += ` <span class="text-[11px] bg-hanamu-red/20 text-hanamu-red px-2 py-0.5 rounded-full ml-2">⚠️ ${abnormalCount} 項異常</span>`;

  // ✅ 如果有攻擊性、恐懼、分離焦慮等，加警示標籤

function buildFinishMsg(){

  const skin    = ($("finishSkin").value || "").trim();
  const fee     = ($("finishFee").value || "").trim();
  const extra   = ($("finishExtra").value || "").trim();

  const lines = [];
  lines.push("【美容完成通知】");
  lines.push(`${pet}已洗香香完成囉！`);

  if (overall || skin || fee) {
    lines.push("今日美容整體狀況如下：");
    if (overall) lines.push(`- 整體狀況：${overall}`);
    if (skin)    lines.push(`- 皮膚／外觀狀況：${skin}`);
    if (fee)     lines.push(`- 費用明細：${fee}`);
  }

  if (extra) {
    lines.push("");
    lines.push("特別提醒：");
    lines.push(extra);
  }

  lines.push("");
  lines.push("請於通知後一小時內接回，逾時將酌收逾時費喔！");

  return lines.join("\n");
}

    $("recordsPanel").classList.remove("hidden");
    $("customersPanel").classList.add("hidden");
    $("tabRecords").classList.add("active");
    $("tabCustomers").classList.remove("active");
  };

  $("tabCustomers").onclick=()=>{
    $("customersPanel").classList.remove("hidden");
    $("recordsPanel").classList.add("hidden");
    $("tabCustomers").classList.add("active");
    $("tabRecords").classList.remove("active");
    renderCustomers();
  };

  $("btnCloseDetail").onclick=()=>{$("detailModal").classList.add("hidden");};
  $("btnCloseCustomerModal").onclick=()=>closeCustomerModal();
  $("customerModalBackdrop").onclick=()=>closeCustomerModal();
  $("btnSwitchRole").onclick = ()=>{
    $("loginStepPwd").classList.add("hidden");
    $("loginStepPick").classList.remove("hidden");
    $("loginPassword").value = "";
  };
  $("loginPassword").addEventListener("keydown", (e)=>{
    if(e.key === "Enter") doLogin();
  });
  $("searchInput").addEventListener("input", handleSearchInput);
  document.addEventListener("keydown", (e)=>{
    if(e.key === "Escape"){
      $("detailModal").classList.add("hidden");
      $("customerModal").classList.add("hidden");
      $("finishModal").classList.add("hidden");
      $("authModal").classList.add("hidden");
      $("pwdModal").classList.add("hidden");
    }
  });
  if(window.lucide) lucide.createIcons();
  boot();
});

// ===== Service Worker =====
(function () {
  if (!("serviceWorker" in navigator)) return;

  function canAutoReloadNow() {
    const hash = location.hash || "#home";
    const inGrooming = hash.includes("grooming");
    return !inGrooming;
  }

  function toast(type, text, subText) {
    try {
      if (typeof showMsg === "function") showMsg(type, text, subText);
    } catch (e) {}
  }

  window.addEventListener("load", async () => {
    try {
      const reg = await navigator.serviceWorker.register("/admin-sw.js?v=1", { scope: "/" });

      let refreshing = false;
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });

      if (reg.waiting) {
        if (canAutoReloadNow()) {
          reg.waiting.postMessage({ type: "SKIP_WAITING" });
        } else {
          toast("ok", "✅ 偵測到新版本", "建議將此頁重新整理以套用最新版本");
        }
      }

      reg.addEventListener("updatefound", () => {
        const newWorker = reg.installing;
        if (!newWorker) return;

        newWorker.addEventListener("statechange", () => {
          if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
            if (reg.waiting) {
              if (canAutoReloadNow()) {
                reg.waiting.postMessage({ type: "SKIP_WAITING" });
              } else {
                toast("ok", "✅ 偵測到新版本", "建議將此頁重新整理以套用最新版本");
              }
            }
          }
        });
      });

      setInterval(() => {
        reg.update().catch(() => {});
      }, 30 * 60 * 1000);

      reg.update().catch(() => {});

    } catch (err) {
      console.warn("Service Worker 註冊失敗：", err);
    }
  });
})();
</script>
